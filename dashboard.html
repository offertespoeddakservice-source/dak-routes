<style>
.tabs{display:flex;gap:.3rem;flex-wrap:wrap;font-size:.8rem;margin-bottom:.6rem;}.tabs a{background:#fff;border-radius:8px;padding:.35rem .55rem;text-decoration:none;color:#1a73e8;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.06);}

<h1>📊 Cijfers — terugkijken</h1>
<div class="hint">Alles komt live uit je sheets en je straat-log. Niks bijhouden — gewoon kijken.</div>
<div class="per">
  <button id="p-dag" class="act" onclick="zet('dag')">Dag</button>
  <button id="p-week" onclick="zet('week')">Week</button>
  <button id="p-maand" onclick="zet('maand')">Maand</button>
  <button id="p-kwartaal" onclick="zet('kwartaal')">Kwartaal</button>
  <button id="p-jaar" onclick="zet('jaar')">Jaar</button>
</div>
<div class="nu" id="topkaart"><b>laden…</b></div>
<div id="lijst"></div>
<div class="hint" id="status">sheets laden…</div>

<script>
const SHEETS = ['1PF_2fViLo7MasoTIw5vuba4MzxvOvAl_OKl7tMBBZgY','1K7Pns_wrwX0X5liDe3P9Wx3LWcMT5icjw1IA6Na53X8'];
const dagen=['zo','ma','di','wo','do','vr','za'];
const maanden=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const vandaag=new Date();
let per='dag';
let recs=[];          // {d, omzet(wit), klus, offerte, verkocht, done, go}
let tijden={};        // ymd -> {min,max} (ms) uit straat_log
let verkochtRows=[];  // {d, key, bedrag} uit offerte-uitkomsten ('verkocht ... €X')
let factNamen=new Set();
function nkey(n){return String(n||'').toLowerCase().replace(/[^a-z0-9]/g,'');}

function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pDate(v){const m=String(v==null?'':v).match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?/);
  return m?new Date(+m[1],+m[2],+m[3],+(m[4]||0),+(m[5]||0),+(m[6]||0)):null;}
function geld(n){return '€'+Math.round(n).toLocaleString('nl-NL');}

function pkey(d){
  const y=d.getFullYear(),m=d.getMonth();
  if(per==='dag')return {k:ymd(d), l:dagen[d.getDay()]+' '+d.getDate()+'-'+(m+1)+'-'+y};
  if(per==='week'){const t=new Date(d);t.setDate(t.getDate()-((t.getDay()+6)%7));
    return {k:ymd(t), l:'week van ma '+t.getDate()+'-'+(t.getMonth()+1)+'-'+t.getFullYear()};}
  if(per==='maand')return {k:y+'-'+String(m+1).padStart(2,'0'), l:maanden[m]+' '+y};
  if(per==='kwartaal'){const q=Math.floor(m/3)+1;return {k:y+'-Q'+q, l:'Q'+q+' '+y};}
  return {k:String(y), l:String(y)};
}

function zet(p){per=p;
  ['dag','week','maand','kwartaal','jaar'].forEach(x=>document.getElementById('p-'+x).className=(x===p?'act':''));
  render();}

function render(){
  const groepen={};
  const leeg=(l)=>({l:l,omzet:0,zwart:0,kosten:0,klus:0,offerte:0,verkocht:0,done:0,go:0,uren:0,dgn:new Set()});
  for(const r of recs){
    const {k,l}=pkey(r.d);
    const g=groepen[k]||(groepen[k]=leeg(l));
    g.omzet+=r.omzet||0; g.kosten+=r.kosten||0; g.klus+=r.klus||0; g.offerte+=r.offerte||0; g.verkocht+=r.verkocht||0;
    g.done+=r.done||0; g.go+=r.go||0;
    if(r.done||r.go)g.dgn.add(ymd(r.d));
  }
  // ⚫ zwart = verkocht in offerte-sheet zónder factuur erbij (⚪ wit = facturen-omzet)
  for(const v of verkochtRows){
    if(v.key&&factNamen.has(v.key))continue;
    const {k,l}=pkey(v.d);
    const g=groepen[k]||(groepen[k]=leeg(l));
    g.zwart+=v.bedrag||0;
  }
  // looptijd (eerste→laatste log-actie per dag) bij de juiste periode optellen
  for(const [dag,t] of Object.entries(tijden)){
    const d=new Date(dag+'T12:00:00'); const {k,l}=pkey(d);
    const g=groepen[k]||(groepen[k]=leeg(l));
    if(t.max>t.min) g.uren+=(t.max-t.min)/36e5;
  }
  const keys=Object.keys(groepen).sort().reverse();
  const html=(g)=>{
    const delen=[];
    if(g.omzet||g.zwart)delen.push('💶 '+geld(g.omzet+g.zwart)+(g.zwart?' (⚪ '+geld(g.omzet)+' · ⚫ '+geld(g.zwart)+')':''));
    if(g.kosten)delen.push('💸 '+geld(g.kosten)+' kosten');
    if((g.omzet||g.zwart)&&g.kosten)delen.push('📈 winst '+geld(g.omzet+g.zwart-g.kosten));
    if(g.omzet)delen.push('🧾 btw '+geld(g.omzet*21/121));
    if(g.klus)delen.push('🔧 '+g.klus+' klus'+(g.klus>1?'sen':''));
    if(g.offerte)delen.push('📄 '+g.offerte+' offertes');
    if(g.verkocht)delen.push('✅ '+g.verkocht+' verkocht');
    if(g.done)delen.push('🚶 '+g.done+' straten af');
    if(g.go)delen.push('🟢 '+g.go+' GO');
    if(g.uren>=0.2)delen.push('⏱ '+g.uren.toFixed(1)+'u actief');
    return delen.length?delen.join(' · '):'rustig — geen activiteit gelogd';
  };
  const nuK=pkey(vandaag).k;
  const top=groepen[nuK];
  document.getElementById('topkaart').innerHTML = '<b>Nu: '+pkey(vandaag).l+'</b><div class="cijfers">'
    +'<div><span class="n">'+geld(top?top.omzet+top.zwart:0)+'</span><span class="t">omzet</span></div>'
    +'<div><span class="n">'+geld(top?top.omzet:0)+'</span><span class="t">⚪ wit (factuur)</span></div>'
    +'<div><span class="n">'+geld(top?top.zwart:0)+'</span><span class="t">⚫ zwart</span></div>'
    +'<div><span class="n">'+geld(top?top.kosten:0)+'</span><span class="t">💸 kosten</span></div>'
    +'<div><span class="n">'+geld(top?top.omzet+top.zwart-top.kosten:0)+'</span><span class="t">📈 winst</span></div>'
    +'<div><span class="n">'+geld(top?top.omzet*21/121:0)+'</span><span class="t">🧾 btw opzij</span></div>'
    +'<div><span class="n">'+(top?top.klus:0)+'</span><span class="t">klussen</span></div>'
    +'<div><span class="n">'+(top?top.done:0)+'</span><span class="t">straten af</span></div>'
    +'<div><span class="n">'+(top?top.uren.toFixed(1):'0')+'u</span><span class="t">actief</span></div></div>'
    +'<div class="hint">🧾 = 21/121 van je wit-omzet apart zetten voor de btw-aangifte. ⚫ = verkocht-uitkomsten zonder factuur.</div>';
  document.getElementById('lijst').innerHTML = keys.filter(k=>k!==nuK).slice(0,60).map(k=>
    '<div class="rij"><b>'+groepen[k].l+'</b><span>'+html(groepen[k])+'</span></div>').join('')
    || '<div class="hint">Nog geen eerdere periodes — dit vult zich vanzelf.</div>';
}

// ---- laden: offerte-tab, facturen-tab, straat_log-tab -----------------------
let stap=0;
function klaar(){stap++;if(stap>=3){document.getElementById('status').textContent='';render();}}

window.__off=function(r){
  try{
    const cols=r.table.cols.map(c=>(c.label||'').toLowerCase());
    const ix=(n)=>cols.findIndex(c=>c.includes(n));
    const iTs=ix('timestamp')>=0?ix('timestamp'):0, iToel=ix('toelichting'), iVerk=ix('analyseren'), iNm=ix('naam');
    for(const row of r.table.rows){
      const c=row.c; if(!c)continue;
      const d=pDate(c[iTs]&&c[iTs].v); if(!d)continue;
      const alles=(String(iToel>=0&&c[iToel]&&c[iToel].v||'')+' '+String(iVerk>=0&&c[iVerk]&&c[iVerk].v||'')).toLowerCase();
      const vk=/verkocht/.test(alles);
      recs.push({d:d, offerte:1, verkocht:vk?1:0});
      if(vk){
        const m=alles.match(/verkocht[^€0-9]*€?\s*([0-9][0-9.,]*)/);
        verkochtRows.push({d:d, key:nkey(iNm>=0&&c[iNm]&&c[iNm].v), bedrag:m?parseFloat(m[1].replace(',','.')):0});
      }
    }
  }catch(e){}
  klaar();
};
window.__fac=function(r){
  try{
    const cols=r.table.cols.map(c=>(c.label||'').toLowerCase());
    const ix=(n)=>cols.findIndex(c=>c.includes(n));
    const iDat=ix('datum werkzaamheden'), iFd=ix('factuur datum'), iTs=ix('timestamp'), iTot=ix('totaal inclusief'), iNm=ix('naam');
    for(const row of r.table.rows){
      const c=row.c; if(!c)continue;
      const nm=iNm>=0&&c[iNm]&&String(c[iNm].v||'').trim();
      if(nm)factNamen.add(nkey(nm));
      const d=pDate(c[iDat]&&c[iDat].v)||pDate(iFd>=0&&c[iFd]&&c[iFd].v)||pDate(iTs>=0&&c[iTs]&&c[iTs].v);
      if(!d)continue;
      const tot=iTot>=0&&c[iTot]&&parseFloat(String(c[iTot].v).replace(/[^0-9.,-]/g,'').replace(',','.'))||0;
      recs.push({d:d, klus:1, omzet:tot>0?tot:0});
    }
  }catch(e){}
  klaar();
};
window.__log=function(r){
  try{
    for(const row of r.table.rows){
      const c=row.c; if(!c||!c[0])continue;
      const d=pDate(c[0].v); if(!d)continue;
      const buurt=String(c[1]&&c[1].v||'');
      const actie=String(c[3]&&c[3].v||'').toLowerCase();
      if(buurt==='KOSTEN'){
        const bm=actie.match(/€\s*([0-9][0-9.,]*)/);
        const dm=actie.match(/datum=(\d{4}-\d{2}-\d{2})/);
        const kd=dm?new Date(dm[1]+'T12:00:00'):d;
        if(bm)recs.push({d:kd,kosten:parseFloat(bm[1].replace(',','.'))||0});
        continue;
      }
      const dag=ymd(d), t=tijden[dag]||(tijden[dag]={min:d.getTime(),max:d.getTime()});
      t.min=Math.min(t.min,d.getTime()); t.max=Math.max(t.max,d.getTime());
      if(actie==='done')recs.push({d:d,done:1});
      else if(actie==='go'||actie.startsWith('go '))recs.push({d:d,go:1});
    }
  }catch(e){}
  klaar();
};
function laad(src,h){const s=document.createElement('script');s.src=src;s.onerror=klaar;document.body.appendChild(s);}
laad('https://docs.google.com/spreadsheets/d/'+SHEETS[0]+'/gviz/tq?tqx=out:json;responseHandler:__off');
laad('https://docs.google.com/spreadsheets/d/'+SHEETS[1]+'/gviz/tq?tqx=out:json;responseHandler:__fac');
laad('https://docs.google.com/spreadsheets/d/'+SHEETS[0]+'/gviz/tq?tqx=out:json;responseHandler:__log&sheet=straat_log&headers=0');
const ts=document.getElementById('t-straten');if(ts)ts.href=localStorage.getItem('laatste_plan')||'begin_lijst.html';
</script></body></html>
