const doneLaag = L.featureGroup();
for (const d of doneLijnen){
  const pl = L.polyline(d.line,{color:'#111',weight:6,opacity:.78});
  pl.bindPopup('<b>'+d.straat+'</b><br>'+d.buurt+'<br>✅ GEDAAN');
  pl.addTo(doneLaag);
}

const buurtenLaag = L.featureGroup();
for (const b of buurten){
  let pop = '<b>'+b.naam+'</b> ('+b.gemeente+')<br>score '+b.score;
  if(b.n_go!==null) pop += ' · 🟢 '+b.n_go+' GO-straten';
  if(b.n_straten) pop += '<br>gedaan: '+b.n_done+' / '+b.n_straten+' straten';
  if(b.laatste) pop += '<br>📅 laatste bezoek: '+b.laatste;
  if(b.pct) pop += ' · '+b.pct+'% af';
  if(b.review) pop += '<br>⭐ '+b.review;
  if(b.plan) pop += '<br><a href="'+b.plan+'" target="_blank">→ straatplan</a>';
  const g = polys[b.code];
  if (g){
    const ly = L.geoJSON(g,{style:{color:bk[b.status],weight:3.5,fillColor:bk[b.status],
      fillOpacity:.05+(b.pct/100)*.4}});
    ly.bindTooltip(b.naam); ly.bindPopup(pop); ly.addTo(buurtenLaag);
  } else {
    const c = L.circleMarker([b.lat,b.lon],{radius:13,color:bk[b.status],weight:3.5,fillColor:bk[b.status],fillOpacity:.1});
    c.bindTooltip(b.naam); c.bindPopup(pop); c.addTo(buurtenLaag);
  }
}

buurtenLaag.addTo(map); stratenLaag.addTo(map); doneLaag.addTo(map);
L.control.layers(null, {'Buurten':buurtenLaag,'Straten':stratenLaag,'Gedaan':doneLaag}).addTo(map);
map.setView([51.65,5.3],10); // vangnet: altijd Brabant, ook als bounds stuk zijn
try{
  const b = buurtenLaag.getBounds();
  if(b.isValid() && Math.abs(b.getCenter().lat-51.6)<2 && Math.abs(b.getCenter().lng-5.3)<2)
    map.fitBounds(b.pad(0.1));
}catch(e){}
const ts=document.getElementById('t-straten');if(ts)ts.href=localStorage.getItem('laatste_plan')||'begin_lijst.html';
</script></body></html>
