<h1>🗺️ Aalsburg — straatplan</h1>
<div class='intro'>🎯 = bouwjaar 1955-1980. Bekijk de 3 foto's (begin/midden/eind): is de <b>nok halfrond</b>?
De aller-slechtste straten (0) zijn er al uit gefilterd. Tik <b>GO/skip</b> + <b>DONE</b> als je 'm gelopen hebt.</div>
<div class='bar'><div class='teller' id='teller'>—</div></div>

        <div class='straat' id='s_Aalsburg' data-init=''>
          <div class='kop'><span class='nr'>1</span>
            <span class='naam'>Aalsburg</span>
            <span class='bj bj-top'>🎯 1972</span></div>
          
          <div class='fotos'><figure><img src='fotos/BU02960113_Aalsburg_begin.jpg' loading='lazy'><figcaption>begin nr1410</figcaption></figure><figure><img src='fotos/BU02960113_Aalsburg_midden.jpg' loading='lazy'><figcaption>midden nr1802</figcaption></figure><figure><img src='fotos/BU02960113_Aalsburg_eind.jpg' loading='lazy'><figcaption>eind nr2825</figcaption></figure></div>
          <div class='nokzoom'><img src='fotos/BU02960113_Aalsburg_nok.jpg' loading='lazy'><div class='nokcap'>nok-zoom (midden)</div></div>
          <div class='links'>
            <a class='gm' href='https://www.google.com/maps/dir/?api=1&destination=51.80650922,5.71288933&travelmode=walking' target='_blank'>🚶 Hierheen</a>
            <a class='gm sv' href='https://www.google.com/maps/search/?api=1&query=51.80650922,5.71288933' target='_blank'>🗺️ Maps</a>
          </div>
          <div class='knoppen'>
            <button class='go' onclick='mark("Aalsburg","go")'>✓ GO</button>
            <button class='meh' onclick='mark("Aalsburg","meh")'>~ twijfel</button>
            <button class='skip' onclick='mark("Aalsburg","skip")'>✗ skip</button>
            <button class='done' onclick='markDone("Aalsburg","Aalsburg")'>✅ DONE</button>
          </div>
        </div>

<button class='export' onclick='exportDone()'>💬 Stuur gelopen straten via WhatsApp (naar jezelf)</button>
<script>
const code='BU02960113', naam='Aalsburg';
const v=JSON.parse(localStorage.getItem('plan_'+code)||'{}');
const done=JSON.parse(localStorage.getItem('done_'+code)||'{}');
function paint(k){const el=document.getElementById('s_'+k);if(!el)return;el.classList.remove('go','meh','skip');const val=v[k]||el.dataset.init;if(val)el.classList.add(val);if(done[k])el.classList.add('gedaan');}
function tel(){let g=0,d=0,t=document.querySelectorAll('.straat').length;for(const el of document.querySelectorAll('.straat')){const k=el.id.slice(2);if((v[k]||el.dataset.init)==='go')g++;if(done[k])d++;}document.getElementById('teller').textContent=t+' straten · '+g+' groen · '+d+' gedaan';}
function mark(k,val){v[k]=val;localStorage.setItem('plan_'+code,JSON.stringify(v));paint(k);tel();}
function markDone(k,s){done[k]=s;localStorage.setItem('done_'+code,JSON.stringify(done));paint(k);tel();}
function exportDone(){const d=new Date().toISOString().slice(0,10);const L=[];for(const s of Object.values(done))L.push(s);if(!L.length){alert('Nog niks op DONE gezet.');return;}const txt='GELOPEN '+d+' — '+naam+':\n'+L.map(s=>'✅ '+s).join('\n');window.location.href='https://wa.me/?text='+encodeURIComponent(txt);}
document.querySelectorAll('.straat').forEach(el=>paint(el.id.slice(2)));tel();
</script></body></html>
