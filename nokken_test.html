<style>
.tabs{display:flex;gap:.3rem;flex-wrap:wrap;font-size:.8rem;margin-bottom:.5rem;}.tabs a{background:#fff;border-radius:8px;padding:.35rem .55rem;text-decoration:none;color:#1a73e8;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.06);}

.kaart img{width:100%;border-radius:8px;display:block;background:#eee;min-height:160px;}

</style></head><body>

<h1>🔍 Nokken-keuring</h1>
<div class="hint">Jij bepaalt wat het is — jouw oordeel is de waarheid. Ik toon mijn gok ernaast zodat we mij blijven meten. <b>Onduidelijk?</b> → tik "❓ extra foto's" en die straat komt later terug met meer hoeken.</div>
<div class="bar"><span id="vg">laden…</span><span id="eens"></span></div>
<div class="ikgok" id="ikgok"></div>
<div id="kaart"></div>
<div class="nav"><button onclick="terug()">← vorige</button><button onclick="skip()">overslaan →</button></div>
<div class="flits" id="flits"></div>
<script>
const LOGURL="https://script.google.com/macros/s/AKfycbzQEt7CUybrqFtYqBTsJ3IxTkTLTw1yz5J9KezJsmMdqGUWNKVZIWyO6An-VFPAahP6FA/exec";
let Q=[], i=0, eens=0, beoordeeld=0;
function log(a,s){try{fetch(LOGURL+"?"+new URLSearchParams({buurt:"NOKLABEL",straat:s,actie:a}),{mode:"no-cors"});}catch(e){}}
function flits(t,kleur){const f=document.getElementById("flits");f.textContent=t;f.style.color=kleur;f.style.opacity=1;setTimeout(()=>f.style.opacity=0,250);}
function toon(){
  if(!Q.length)return;
  if(i>=Q.length)i=Q.length-1; if(i<0)i=0;
  const it=Q[i];
  document.getElementById("vg").textContent="Straat "+(i+1)+" / "+Q.length;
  document.getElementById("eens").textContent=beoordeeld?("we eens: "+eens+"/"+beoordeeld):"";
  document.getElementById("ikgok").innerHTML = it.gok ? ("🤖 Ik denk: <b>"+it.gok+"</b>") : "🤖 Ik heb hier <b>geen gok</b> — jij bepaalt";
  document.getElementById("kaart").innerHTML='<div class="kaart"><img src="'+it.foto+'" loading="eager">'
    +'<div class="straat">'+it.buurt+' · '+it.straat+'</div>'
    +'<div class="knoppen">'
    +'<button class="b-half" onclick="kies(\'halve nok\')">🟢 halve nok</button>'
    +'<button class="b-schub" onclick="kies(\'schub nok\')">🟠 schub nok</button>'
    +'<button class="b-plat" onclick="kies(\'plat dak\')">⬜ plat dak</button>'
    +'<button class="b-geen" onclick="kies(\'geen dak\')">🌳 geen dak</button>'
    +'<button class="b-onduid" onclick="kies(\'onduidelijk\')">❓ extra foto\'s</button>'
    +'<button class="b-over" onclick="kiesOver()">✏️ overige…</button>'
    +'</div></div>';
}
function kiesOver(){var t=prompt("Wat is het dan?");if(t)kies("overige: "+t);}
function kies(antwoord){
  const it=Q[i];
  const match=it.gok && (antwoord===it.gok);
  if(it.gok){beoordeeld++; if(match)eens++;}
  log(antwoord+(it.gok?(" | mijn:"+it.gok+" | "+(match?"EENS":"ONEENS")):" | mijn:-"), it.stem);
  const done=JSON.parse(localStorage.getItem("nok_done")||"{}"); done[it.stem]=antwoord; localStorage.setItem("nok_done",JSON.stringify(done));
  flits(antwoord==='halve nok'?'🟢':antwoord==='onduidelijk'?'❓':'✓', antwoord==='halve nok'?'#1a9850':'#1a73e8');
  i++; localStorage.setItem("nok_idx",i);
  if(i>=Q.length){klaar();return;}
  toon();
}
function terug(){i--;localStorage.setItem("nok_idx",i);toon();}
function skip(){i++;localStorage.setItem("nok_idx",i);if(i>=Q.length){klaar();return;}toon();}
function klaar(){document.getElementById("kaart").innerHTML='<div class="kaart" style="text-align:center"><b>🎉 Alles gehad!</b><br>Je labels staan in de sheet — Claude bouwt er de echte keuring mee.</div>';document.getElementById("ikgok").textContent="";}
var QF=new URLSearchParams(location.search).get('q')==='reshoot'?'noktest_reshoot.json':'noktest_queue.json';
fetch(QF).then(r=>r.json()).then(q=>{
  const done=JSON.parse(localStorage.getItem("nok_done")||"{}");
  Q=q.filter(x=>!done[x.stem]);
  i=0;
  if(!Q.length){klaar();return;}
  toon();
}).catch(e=>{document.getElementById("kaart").innerHTML='<div class="kaart">kon wachtrij niet laden</div>';});
</script></body></html>
