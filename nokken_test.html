<h1>🔍 Nokken-tester</h1>
<div class="hint">Ik laat een dak-foto zien. <b>Jij</b> tikt wat het écht is. Daarna zie je wat <b>ik</b> dacht \u2014 zo meten we of mijn keuring betrouwbaar is. Eerlijk getoetst.</div>
<div class="voortgang" id="vg"></div>
<div id="kaart"></div>
<script>
const LOGURL="https://script.google.com/macros/s/AKfycbzQEt7CUybrqFtYqBTsJ3IxTkTLTw1yz5J9KezJsmMdqGUWNKVZIWyO6An-VFPAahP6FA/exec";
const SAMPLE=[{"foto": "straatplan/fotos/BU08260600_Papendonk_nok.jpg", "straat": "Papendonk", "buurt": "Kruidenbuurt", "gok": "plat dak", "id": "BU08260600_Papendonk_nok"}, {"foto": "straatplan/fotos/BU19480301_LaantenRode_nok.jpg", "straat": "Laan ten Rode", "buurt": "Armenhoef", "gok": "schub nok", "id": "BU19480301_LaantenRode_nok"}, {"foto": "straatplan/fotos/BU07530003_Klepperen_nok.jpg", "straat": "Klepperen", "buurt": "Speelheide", "gok": "overige", "id": "BU07530003_Klepperen_nok"}, {"foto": "straatplan/fotos/BU08093080_Gagarinstraat_nok.jpg", "straat": "Gagarinstraat", "buurt": "Molenwijk (noord)", "gok": "schub nok", "id": "BU08093080_Gagarinstraat_nok"}, {"foto": "straatplan/fotos/BU08480001_deLinge_nok.jpg", "straat": "de Linge", "buurt": "De Gentiaan", "gok": "overige", "id": "BU08480001_deLinge_nok"}, {"foto": "straatplan/fotos/BU08480001_Donaulaan_nok.jpg", "straat": "Donaulaan", "buurt": "De Gentiaan", "gok": "geen dak zichtbaar", "id": "BU08480001_Donaulaan_nok"}, {"foto": "straatplan/fotos/BU08230002_Kremerstraat_nok.jpg", "straat": "Kremerstraat", "buurt": "De Notel", "gok": "overige", "id": "BU08230002_Kremerstraat_nok"}, {"foto": "straatplan/fotos/BU19820203_Airborneplein_nok.jpg", "straat": "Airborneplein", "buurt": "Mars", "gok": "halve nok", "id": "BU19820203_Airborneplein_nok"}, {"foto": "straatplan/fotos/BU08230002_deDonk_nok.jpg", "straat": "de Donk", "buurt": "De Notel", "gok": "overige", "id": "BU08230002_deDonk_nok"}, {"foto": "straatplan/fotos/BU08480001_Frieslandlaan_nok.jpg", "straat": "Frieslandlaan", "buurt": "De Gentiaan", "gok": "overige", "id": "BU08480001_Frieslandlaan_nok"}, {"foto": "straatplan/fotos/BU07530003_Klabots_nok.jpg", "straat": "Klabots", "buurt": "Speelheide", "gok": "overige", "id": "BU07530003_Klabots_nok"}, {"foto": "straatplan/fotos/BU08230002_Schoemekerstra_nok.jpg", "straat": "Schoemekerstraat", "buurt": "De Notel", "gok": "overige", "id": "BU08230002_Schoemekerstra_nok"}, {"foto": "straatplan/fotos/BU08480001_Moezellaan_nok.jpg", "straat": "Moezellaan", "buurt": "De Gentiaan", "gok": "geen dak zichtbaar", "id": "BU08480001_Moezellaan_nok"}, {"foto": "straatplan/fotos/BU19480301_VanHomberghlaa_nok.jpg", "straat": "Van Homberghlaan", "buurt": "Armenhoef", "gok": "geen dak zichtbaar", "id": "BU19480301_VanHomberghlaa_nok"}, {"foto": "straatplan/fotos/BU08230002_Cloete_nok.jpg", "straat": "Cloete", "buurt": "De Notel", "gok": "overige", "id": "BU08230002_Cloete_nok"}, {"foto": "straatplan/fotos/BU07850917_DeHilver_nok.jpg", "straat": "De Hilver", "buurt": "Rivieren", "gok": "schub nok", "id": "BU07850917_DeHilver_nok"}, {"foto": "straatplan/fotos/BU07850202_RobertBaeldest_nok.jpg", "straat": "Robert Baeldestraat", "buurt": "Grobbendonck", "gok": "plat dak", "id": "BU07850202_RobertBaeldest_nok"}, {"foto": "straatplan/fotos/BU08260600_Waterkerslaan_nok.jpg", "straat": "Waterkerslaan", "buurt": "Kruidenbuurt", "gok": "schub nok", "id": "BU08260600_Waterkerslaan_nok"}, {"foto": "straatplan/fotos/BU08091025_Oldenbarnevelt_nok.jpg", "straat": "Oldenbarneveltstraat", "buurt": "Staatsliedenbuurt", "gok": "schub nok", "id": "BU08091025_Oldenbarnevelt_nok"}, {"foto": "straatplan/fotos/BU08230002_Notel_nok.jpg", "straat": "Notel", "buurt": "De Notel", "gok": "halve nok", "id": "BU08230002_Notel_nok"}, {"foto": "straatplan/fotos/BU08260600_Alsemhof_nok.jpg", "straat": "Alsemhof", "buurt": "Kruidenbuurt", "gok": "geen dak zichtbaar", "id": "BU08260600_Alsemhof_nok"}, {"foto": "straatplan/fotos/BU19820203_Habsburgsestra_nok.jpg", "straat": "Habsburgsestraat", "buurt": "Mars", "gok": "halve nok", "id": "BU19820203_Habsburgsestra_nok"}, {"foto": "straatplan/fotos/BU08670005_Madeliefstraat_nok.jpg", "straat": "Madeliefstraat", "buurt": "Bloemenoord", "gok": "geen dak zichtbaar", "id": "BU08670005_Madeliefstraat_nok"}, {"foto": "straatplan/fotos/BU08260600_Basielhof_nok.jpg", "straat": "Basielhof", "buurt": "Kruidenbuurt", "gok": "schub nok", "id": "BU08260600_Basielhof_nok"}, {"foto": "straatplan/fotos/BU08230002_dekorteSpruit_nok.jpg", "straat": "de korte Spruit", "buurt": "De Notel", "gok": "halve nok", "id": "BU08230002_dekorteSpruit_nok"}, {"foto": "straatplan/fotos/BU08230002_vanAudenhovens_nok.jpg", "straat": "van Audenhovenstraat", "buurt": "De Notel", "gok": "halve nok", "id": "BU08230002_vanAudenhovens_nok"}, {"foto": "straatplan/fotos/BU08670005_Seringenhof_nok.jpg", "straat": "Seringenhof", "buurt": "Bloemenoord", "gok": "halve nok", "id": "BU08670005_Seringenhof_nok"}, {"foto": "straatplan/fotos/BU02160003_Kastanjeboom_nok.jpg", "straat": "Kastanjeboom", "buurt": "De Hond", "gok": "geen dak zichtbaar", "id": "BU02160003_Kastanjeboom_nok"}, {"foto": "straatplan/fotos/BU19480301_Taxandriastraa_nok.jpg", "straat": "Taxandriastraat", "buurt": "Armenhoef", "gok": "halve nok", "id": "BU19480301_Taxandriastraa_nok"}, {"foto": "straatplan/fotos/BU07850917_DeWetering_nok.jpg", "straat": "De Wetering", "buurt": "Rivieren", "gok": "schub nok", "id": "BU07850917_DeWetering_nok"}];
let i=0, goed=0, antwoorden=[];
function log(a,s){try{fetch(LOGURL+"?"+new URLSearchParams({buurt:"NOKTEST",straat:s,actie:a}),{mode:"no-cors"});}catch(e){}}
function toon(){
  const K=document.getElementById("kaart");
  document.getElementById("vg").textContent="Foto "+(i+1)+" van "+SAMPLE.length+(i>0?"  \u00b7  ik tot nu "+goed+"/"+i+" goed":"");
  if(i>=SAMPLE.length){eind();return;}
  const it=SAMPLE[i];
  K.innerHTML=`<div class="kaart"><img src="${it.foto}" onerror="this.style.opacity=.3">
    <div class="straat">${it.buurt} \u00b7 ${it.straat}</div>
    <div class="knoppen">
      <button class="b-half" onclick="kies('halve nok')">🟢 halve nok</button>
      <button class="b-schub" onclick="kies('schub nok')">🟠 schub nok</button>
      <button class="b-plat" onclick="kies('plat dak')">⬜ plat dak</button>
      <button class="b-geen" onclick="kies('geen dak zichtbaar')">🌳 geen dak zichtbaar</button>
      <button class="b-over" onclick="kiesOver()">✏️ overige\u2026</button>
    </div></div>`;
}
function kiesOver(){const t=prompt("Wat is het dan?");if(t)kies("overige: "+t);}
function kies(antwoord){
  const it=SAMPLE[i];
  const match=(antwoord===it.gok)||(antwoord.startsWith("overige")&&it.gok==="overige");
  if(match)goed++;
  antwoorden.push({id:it.id,ik:it.gok,jij:antwoord,match:match});
  log("ik:"+it.gok+" | jij:"+antwoord+" | "+(match?"GOED":"FOUT"),it.id);
  const K=document.getElementById("kaart");
  K.insertAdjacentHTML("beforeend",`<div class="uitslag ${match?'goed':'fout'}">${match?'✅ ik had het goed':'❌ ik zat ernaast'} \u2014 ik dacht: <b>${it.gok}</b></div>`);
  setTimeout(()=>{i++;toon();},1100);
}
function eind(){
  const pct=Math.round(goed/SAMPLE.length*100);
  // tel per categorie
  const cats={};
  for(const a of antwoorden){cats[a.ik]=cats[a.ik]||{g:0,t:0};cats[a.ik].t++;if(a.match)cats[a.ik].g++;}
  let rij="";for(const c in cats)rij+=`<div style="font-size:.85rem;margin:.2rem 0">${c}: ${cats[c].g}/${cats[c].t}</div>`;
  document.getElementById("kaart").innerHTML=`<div class="eind">
    <div class="pct">${pct}%</div>
    <div>ik had ${goed} van ${SAMPLE.length} goed</div>
    <div style="margin-top:.6rem;text-align:left">${rij}</div>
    <div style="margin-top:.7rem;font-size:.8rem;opacity:.8">${pct>=80?'👍 Betrouwbaar genoeg om op te keuren':pct>=60?'⚠️ Wisselend \u2014 alleen als hint gebruiken':'🚫 Niet betrouwbaar \u2014 beter op data sturen'}</div>
    <div style="margin-top:.5rem;font-size:.75rem;opacity:.7">Resultaat is gelogd \u2014 Claude leest het de volgende sessie.</div></div>`;
  document.getElementById("vg").textContent="Klaar!";
}
toon();
</script></body></html>
